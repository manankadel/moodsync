version: '3.8'

networks:
  moodsync_net:
    driver: bridge

services:
  redis:
    image: redis:alpine
    networks:
      - moodsync_net
    ports:
      - "6379:6379"
    restart: always

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    networks:
      - moodsync_net
    ports:
      - "5001:5001"
    environment:
      - REDIS_URL=redis://redis:6379
      - FLASK_ENV=development
    depends_on:
      - redis
    volumes:
      - ./uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5001}
    networks:
      - moodsync_net
    ports:
      - "3000:3000"
    depends_on:
      - backend